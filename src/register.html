<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar | DrinkApp</title>
  <link rel="stylesheet" href="css/styles.css">
  <script type="module" src="js/register.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar_inner">
      <a class="brand" href="index.html">DrinkApp</a>
      <nav class="nav">
        <a href="login.html">Entrar</a>
        <a href="dashboard.html">Painel</a>
      </nav>
    </div>
  </header>

  <main class="container page page-auth">
    <section class="card auth-card">
      <h1>Criar conta</h1>
      <p>Registre-se e comece a criar bebidas e gerenciar sua coleção.</p>
      <form id="register-form" class="form" novalidate>
        <label>
          <span>Nome</span>
          <input type="text" name="name" autocomplete="name" required>
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
          <span>Senha</span>
          <input type="password" name="password" minlength="6" autocomplete="new-password" required>
        </label>
        <button class="btn btn-primary" type="submit">Criar conta</button>
        <p class="form_helper">Já tem conta? <a href="login.html">Entrar</a>.</p>
        <div id="register-message" class="message" role="alert" aria-live="polite"></div>
      </form>
    </section>
  </main>
</body>
</html>
